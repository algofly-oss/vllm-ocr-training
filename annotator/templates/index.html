<!DOCTYPE html>
<html>
<head>
  <title>Image Annotation</title>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      margin-top: 30px;
      background-color: #121212;
      color: #ffffff;
    }

    img {
      max-width: 80vw;
      max-height: 80vh;
      border: 2px solid #333;
      border-radius: 10px;
    }

    textarea {
      width: 60%;
      height: 40px;
      margin-top: 20px;
      background-color: #1e1e1e;
      color: #ffffff;
      border: 1px solid #444;
      border-radius: 5px;
      padding: 10px;
      font-size: 16px;
    }

    .nav {
      margin-top: 20px;
    }

    button {
      padding: 10px 20px;
      margin: 0 10px;
      font-size: 16px;
      background-color: #333;
      color: #fff;
      border: 1px solid #555;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #444;
    }
  </style>
</head>
<body>
  <h2>Image {{ idx + 1 }} / {{ total }}</h2>
  <img src="{{ image_file }}" alt="Image">
  <form method="post">
    <div>
      <textarea name="ocr_text" placeholder="Enter OCR text...">{{ ocr_text }}</textarea>
    </div>
    <div class="nav">
      <button type="submit" name="direction" value="prev">Previous</button>
      <button type="submit" name="direction" value="next">Next</button>
    </div>
  </form>
</body>
</html>
