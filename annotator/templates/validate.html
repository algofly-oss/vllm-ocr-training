<!DOCTYPE html>
<html>
<head>
  <title>Label Validator</title>
  <style>
    body {
      background-color: #121212;
      color: #e0e0e0;
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    h2 {
      color: #ffffff;
    }

    img {
      max-height: 500px;
      margin-bottom: 20px;
      display: block;
      border: 1px solid #444;
    }

    textarea {
      width: 100%;
      height: 100px;
      background-color: #1e1e1e;
      color: #e0e0e0;
      border: 1px solid #555;
      padding: 10px;
      font-size: 16px;
      resize: none;
    }

    .index {
      margin-top: 10px;
      font-weight: bold;
      color: #bbbbbb;
    }

    .nav {
      margin-top: 20px;
    }

    button {
      padding: 10px 20px;
      margin: 5px;
      font-size: 16px;
      background-color: #333;
      color: #fff;
      border: 1px solid #555;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    button:hover {
      background-color: #555;
    }
  </style>
</head>
<body>
  <h2>Is the label correct?</h2>
  <img src="{{ image_file }}" alt="Image to validate">
  <textarea readonly>{{ ocr_text }}</textarea>
  <div class="index">Image {{ idx + 1 }} of {{ total }}</div>

  <form method="post">
    <input type="hidden" name="action" value="yes" id="action-field">
    <div class="nav">
      <button type="submit" onclick="setAction('prev')">Prev (←)</button>
      <button type="submit" onclick="setAction('yes')">Yes (A)</button>
      <button type="submit" onclick="setAction('no')">No (D)</button>
      <button type="submit" onclick="setAction('next')">Next (→)</button>
    </div>
  </form>

  <script>
    function setAction(val) {
      document.getElementById('action-field').value = val;
    }

    document.addEventListener('keydown', function (e) {
      if (e.key === 'a') {
        setAction('yes');
        document.forms[0].submit();
      } else if (e.key === 'd') {
        setAction('no');
        document.forms[0].submit();
      } else if (e.key === 'ArrowRight') {
        setAction('next');
        document.forms[0].submit();
      } else if (e.key === 'ArrowLeft') {
        setAction('prev');
        document.forms[0].submit();
      }
    });
  </script>
</body>
</html>
